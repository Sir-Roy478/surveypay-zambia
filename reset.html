<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#1a0a2e"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="SurveyPay"/>
<title>SurveyPay Zambia – Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#ff7a20;--primary-dark:#e05500;--dark:#1a0a2e;--card:#231545;--border:rgba(180,120,255,0.2);--text:#f0e8ff;--muted:#c4a8ff;--white:#ffffff;}
    body{font-family:'DM Sans',sans-serif;background:#1a0a2e;color:#f0e8ff;min-height:100vh;display:flex;flex-direction:column;}
    nav{display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:64px;border-bottom:1px solid var(--border);}
    .nav-logo{font-family:'Sora',sans-serif;font-size:1.3rem;font-weight:800;color:#ffffff;text-decoration:none;}
    .nav-logo span{color:var(--primary);}
    .nav-link{color:#c4a8ff;text-decoration:none;font-size:.9rem;}
    .page{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1rem;background:radial-gradient(ellipse at top,rgba(0,119,255,0.06) 0%,transparent 60%);}
    .card{background:#231545;border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:400px;}
    .card-icon{font-size:2.5rem;margin-bottom:1rem;}
    .card-title{font-family:'Sora',sans-serif;font-size:1.6rem;font-weight:800;color:#ffffff;margin-bottom:.4rem;}
    .card-sub{color:#c4a8ff;font-size:.9rem;margin-bottom:2rem;line-height:1.6;}
    label{display:block;font-size:.85rem;font-weight:600;color:#c4a8ff;margin-bottom:.4rem;}
    input{width:100%;padding:.8rem 1rem;border-radius:10px;background:rgba(180,120,255,0.10);border:1px solid var(--border);color:#f0e8ff;font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s;margin-bottom:1.2rem;}
    input:focus{border-color:rgba(160,80,255,0.48);box-shadow:0 0 0 3px rgba(160,80,255,0.12);}
    input::placeholder{color:rgba(255,255,255,0.2);}
    .submit-btn{width:100%;padding:.9rem;border-radius:50px;background:var(--primary);color:#000;font-family:'Sora',sans-serif;font-size:1rem;font-weight:700;border:none;cursor:pointer;transition:all .2s;box-shadow:0 0 20px rgba(160,80,255,0.3);}
    .submit-btn:hover{background:var(--primary-dark);}
    .submit-btn:disabled{opacity:.6;cursor:not-allowed;}
    .alert-box{border-radius:10px;padding:.8rem 1rem;font-size:.88rem;margin-bottom:1rem;display:none;}
    .alert-box.show{display:block;}
    .alert-box.error{background:rgba(255,82,82,0.08);border:1px solid rgba(255,82,82,0.25);color:#ff5252;}
    .alert-box.success{background:rgba(160,80,255,0.12);border:1px solid rgba(160,80,255,0.3);color:var(--primary);}
    .back-link{display:block;text-align:center;margin-top:1.5rem;color:#c4a8ff;font-size:.88rem;text-decoration:none;}
    .back-link:hover{color:var(--primary);}
    footer{padding:1.5rem 5%;text-align:center;color:#c4a8ff;font-size:.82rem;border-top:1px solid var(--border);}
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Survey<span>Pay</span></a>
  <a class="nav-link" href="login.html">← Back to Login</a>
</nav>
<div class="page">
  <div class="card">
    <div class="card-icon">🔑</div>
    <div class="card-title">Reset Password</div>
    <p class="card-sub">Enter your email and we'll send you a link to reset your password.</p>
    <div class="alert-box" id="alertBox"></div>
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@example.com"/>
    <button class="submit-btn" id="submitBtn" onclick="handleReset()">Send Reset Link</button>
    <a href="login.html" class="back-link">← Back to Sign In</a>
  </div>
</div>
<footer>© 2026 SurveyPay Zambia. All rights reserved.</footer>

<script>
  function handleReset() {
    var email    = document.getElementById('email').value.trim();
    var alertBox = document.getElementById('alertBox');
    alertBox.className = 'alert-box';

    if (!email || !/\S+@\S+\.\S+/.test(email)) {
      alertBox.textContent = 'Please enter a valid email address.';
      alertBox.classList.add('show','error');
      return;
    }
    var btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Sending…';

    auth.sendPasswordResetEmail(email)
      .then(function() {
        alertBox.textContent = '✅ Reset link sent! Check your inbox (and spam folder).';
        alertBox.classList.add('show','success');
        btn.textContent = '✓ Email Sent';
      })
      .catch(function() {
        alertBox.textContent = 'Could not send reset email. Make sure this address is registered.';
        alertBox.classList.add('show','error');
        btn.disabled = false; btn.textContent = 'Send Reset Link';
      });
  }
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/service-worker.js').catch(function(err){
        console.log('Service worker registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
