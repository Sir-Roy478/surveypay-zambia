<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#1a0a2e"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="SurveyPay"/>
<title>SurveyPay Zambia – Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --primary:#ff7a20;--primary-dark:#e05500;
      --bg:#1a0a2e;--card:#231545;--border:rgba(180,120,255,0.2);
      --text:#ffffff;--muted:#c4a8ff;--error:#ff5252;--success:#2ecc71;
    }
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px;background:rgba(20,8,40,0.97);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
    .nav-logo{font-family:'Sora',sans-serif;font-size:1.15rem;font-weight:800;color:#fff;}
    .nav-logo span{color:var(--primary);}
    .logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:50px;font-size:.78rem;cursor:pointer;}

    .main{max-width:900px;margin:0 auto;padding:24px 16px 60px;}
    h1{font-family:'Sora',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:6px;}
    .sub{color:var(--muted);font-size:.85rem;margin-bottom:20px;}

    .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
    .tab{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:50px;font-size:.82rem;font-weight:600;cursor:pointer;}
    .tab.active{background:var(--primary);color:#000;border-color:var(--primary);}

    .stat-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
    .stat-pill{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 16px;font-size:.8rem;}
    .stat-pill b{color:var(--primary);font-family:'Sora',sans-serif;font-size:1.1rem;display:block;}

    .payment-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
    .payment-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
    .payment-name{font-weight:700;font-size:1rem;color:#fff;}
    .payment-email{font-size:.78rem;color:var(--muted);}
    .payment-amount{font-family:'Sora',sans-serif;font-size:1.3rem;font-weight:800;color:var(--primary);white-space:nowrap;}

    .payment-details{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
    .detail-box{background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 10px;}
    .detail-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
    .detail-value{font-size:.88rem;font-weight:600;color:#fff;word-break:break-all;}

    .status-badge{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:50px;white-space:nowrap;}
    .status-badge.pending{background:rgba(255,153,0,0.15);color:#ff9900;}
    .status-badge.approved{background:rgba(46,204,113,0.15);color:var(--success);}
    .status-badge.rejected{background:rgba(255,82,82,0.15);color:var(--error);}

    .btn-row{display:flex;gap:10px;}
    .approve-btn{flex:1;padding:10px;border-radius:50px;background:var(--success);color:#000;font-weight:700;font-size:.85rem;border:none;cursor:pointer;}
    .approve-btn:hover{opacity:.85;}
    .reject-btn{flex:1;padding:10px;border-radius:50px;background:transparent;border:1px solid var(--error);color:var(--error);font-weight:700;font-size:.85rem;cursor:pointer;}
    .reject-btn:hover{background:rgba(255,82,82,0.1);}
    .approve-btn:disabled,.reject-btn:disabled{opacity:.4;cursor:not-allowed;}

    .empty-state{text-align:center;color:var(--muted);padding:40px 0;font-size:.9rem;}
    .loading{text-align:center;color:var(--muted);padding:40px 0;}

    .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
    .login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:30px 24px;max-width:380px;width:100%;text-align:center;}
    .login-box h2{font-family:'Sora',sans-serif;margin-bottom:8px;}
    .login-box p{color:var(--muted);font-size:.85rem;margin-bottom:20px;}
    .login-input{width:100%;padding:12px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:#fff;font-size:.9rem;outline:none;margin-bottom:12px;}
    .login-btn{width:100%;padding:12px;border-radius:50px;background:var(--primary);color:#000;font-weight:700;border:none;cursor:pointer;font-size:.92rem;}
    .login-error{color:var(--error);font-size:.82rem;margin-top:10px;display:none;}
    .login-error.show{display:block;}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#2d1560;border:1px solid rgba(255,122,32,0.3);color:var(--primary);padding:12px 20px;border-radius:50px;font-size:.88rem;font-weight:600;opacity:0;transition:all .35s;pointer-events:none;white-space:nowrap;z-index:999;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    @media(max-width:500px){.payment-details{grid-template-columns:1fr;}}

    /* BROADCAST PANEL */
    .broadcast-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;}
    .broadcast-stats{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap;}
    .broadcast-stat{background:rgba(255,255,255,0.04);border-radius:10px;padding:8px 14px;font-size:.8rem;}
    .broadcast-stat b{color:var(--primary);font-family:'Sora',sans-serif;display:block;font-size:1.1rem;}
    .broadcast-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
    .bc-btn{padding:10px 16px;border-radius:50px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:#fff;font-size:.82rem;font-weight:600;cursor:pointer;}
    .bc-btn:hover{border-color:var(--primary);}
    .bc-btn.primary{background:var(--primary);color:#000;border-color:var(--primary);}
    .bc-btn.primary:hover{background:var(--primary-dark);}
    .email-textarea{width:100%;min-height:120px;padding:12px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:#fff;font-size:.82rem;font-family:monospace;resize:vertical;margin-bottom:10px;}
    .user-search{width:100%;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:#fff;font-size:.85rem;margin-bottom:14px;}
    .user-table-wrap{overflow-x:auto;}
    .user-table{width:100%;border-collapse:collapse;font-size:.82rem;}
    .user-table th{text-align:left;padding:8px 10px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;}
    .user-table td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04);white-space:nowrap;}
    .user-table input[type=checkbox]{accent-color:var(--primary);width:15px;height:15px;cursor:pointer;}
    .mailto-link{display:inline-block;padding:12px 20px;border-radius:50px;background:var(--primary);color:#000;font-weight:700;text-decoration:none;font-size:.88rem;}
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>🔐 Admin Access</h2>
    <p>Sign in with your admin account to review payments</p>
    <input type="email" class="login-input" id="adminEmail" placeholder="Admin email"/>
    <input type="password" class="login-input" id="adminPassword" placeholder="Password"/>
    <button class="login-btn" onclick="adminLogin()">Sign In</button>
    <p class="login-error" id="loginError">Invalid email or password.</p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;">
  <nav>
    <div class="nav-logo">Survey<span>Pay</span> Admin</div>
    <button class="logout-btn" onclick="adminLogout()">Sign out</button>
  </nav>

  <div class="main">
    <h1>Payment Approvals</h1>
    <p class="sub">Review and approve MTN Mobile Money payments submitted by users.</p>

    <div class="stat-row">
      <div class="stat-pill"><b id="countPending">0</b>Pending</div>
      <div class="stat-pill"><b id="countApproved">0</b>Approved</div>
      <div class="stat-pill"><b id="countRejected">0</b>Rejected</div>
      <div class="stat-pill"><b id="countInstalls">0</b>App Installs</div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tabPending" onclick="switchTab('pending')">⏳ Pending</button>
      <button class="tab" id="tabApproved" onclick="switchTab('approved')">✅ Approved</button>
      <button class="tab" id="tabRejected" onclick="switchTab('rejected')">❌ Rejected</button>
      <button class="tab" id="tabInstalls" onclick="switchTab('installs')">📲 Installs</button>
      <button class="tab" id="tabUsers" onclick="switchTab('users')">👥 Users / Broadcast</button>
    </div>

    <div id="paymentsList"><div class="loading">Loading payments…</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  var currentTab = 'pending';
  var allPayments = [];

  function showToast(msg){
    var t=document.getElementById('toast');
    t.textContent=msg;t.classList.add('show');
    setTimeout(function(){t.classList.remove('show');},3000);
  }

  // ── ADMIN LOGIN ──
  function adminLogin(){
    var email=document.getElementById('adminEmail').value.trim();
    var pw=document.getElementById('adminPassword').value;
    var errEl=document.getElementById('loginError');
    errEl.classList.remove('show');

    auth.signInWithEmailAndPassword(email,pw)
    .then(function(){
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('adminPanel').style.display='block';
      loadPayments();
    })
    .catch(function(){
      errEl.textContent='Invalid email or password.';
      errEl.classList.add('show');
    });
  }

  function adminLogout(){
    auth.signOut().then(function(){
      document.getElementById('adminPanel').style.display='none';
      document.getElementById('loginScreen').style.display='flex';
    });
  }

  // Check if already logged in
  auth.onAuthStateChanged(function(user){
    if(user){
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('adminPanel').style.display='block';
      loadPayments();
    }
  });

  // ── LOAD PAYMENTS ──
  var allInstalls = [];
  var allUsers = [];
  var selectedUserEmails = [];

  function loadPayments(){
    document.getElementById('paymentsList').innerHTML='<div class="loading">Loading payments…</div>';
    db.collection('pendingPayments').orderBy('submittedAt','desc').get()
    .then(function(snap){
      allPayments=[];
      snap.forEach(function(doc){
        var data=doc.data();
        data._id=doc.id;
        allPayments.push(data);
      });
      updateCounts();
      renderPayments();
    })
    .catch(function(err){
      document.getElementById('paymentsList').innerHTML='<div class="empty-state">Error loading payments: '+err.message+'</div>';
    });

    loadInstalls();
    loadUsers();
  }

  function loadUsers(){
    db.collection('users').get()
    .then(function(snap){
      allUsers=[];
      snap.forEach(function(doc){
        var data=doc.data();
        data._id=doc.id;
        allUsers.push(data);
      });
      selectedUserEmails = allUsers.map(function(u){return u.email;}).filter(Boolean);
      if(currentTab==='users') renderPayments();
    })
    .catch(function(err){
      console.log('Could not load users:', err.message);
    });
  }

  function loadInstalls(){
    db.collection('installEvents').orderBy('timestamp','desc').limit(200).get()
    .then(function(snap){
      allInstalls=[];
      snap.forEach(function(doc){
        var data=doc.data();
        data._id=doc.id;
        allInstalls.push(data);
      });
      var trueInstalls = allInstalls.filter(function(i){
        return i.event==='installed' || i.event==='prompt_accepted';
      }).length;
      document.getElementById('countInstalls').textContent=trueInstalls;
      if(currentTab==='installs') renderPayments();
    })
    .catch(function(err){
      console.log('Could not load install events:', err.message);
    });
  }

  function updateCounts(){
    var pending=allPayments.filter(function(p){return p.status==='pending';}).length;
    var approved=allPayments.filter(function(p){return p.status==='approved';}).length;
    var rejected=allPayments.filter(function(p){return p.status==='rejected';}).length;
    document.getElementById('countPending').textContent=pending;
    document.getElementById('countApproved').textContent=approved;
    document.getElementById('countRejected').textContent=rejected;
  }

  function switchTab(tab){
    currentTab=tab;
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
    document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
    renderPayments();
  }

  function looksLikeReferralCode(ref){
    if(!ref) return false;
    var cleaned = ref.replace(/[\s.\-]/g,'');
    return /^[A-Za-z]{4}\d{4}$/.test(cleaned);
  }

  function renderUsers(){
    var list=document.getElementById('paymentsList');

    if(allUsers.length===0){
      list.innerHTML='<div class="empty-state">No registered users found.</div>';
      return;
    }

    var html = '<div class="broadcast-box">'+
      '<div class="broadcast-stats">'+
        '<div class="broadcast-stat"><b>'+allUsers.length+'</b>Total Users</div>'+
        '<div class="broadcast-stat"><b id="selectedCount">'+allUsers.length+'</b>Selected</div>'+
      '</div>'+
      '<input type="text" class="user-search" id="userSearch" placeholder="🔍 Search by name or email…" oninput="filterUserTable()"/>'+
      '<div class="broadcast-actions">'+
        '<button class="bc-btn" onclick="toggleSelectAll(true)">Select All</button>'+
        '<button class="bc-btn" onclick="toggleSelectAll(false)">Deselect All</button>'+
        '<button class="bc-btn primary" onclick="copyAllEmails()">📋 Copy Selected Emails</button>'+
      '</div>'+
      '<textarea class="email-textarea" id="emailListBox" readonly></textarea>'+
      '<div style="display:flex;gap:10px;flex-wrap:wrap;">'+
        '<a class="mailto-link" id="mailtoBtn" href="#" onclick="openMailto(event)">✉️ Open in Email App (BCC)</a>'+
      '</div>'+
      '<div class="user-table-wrap" style="margin-top:18px;">'+
        '<table class="user-table" id="userTable">'+
          '<thead><tr><th></th><th>Name</th><th>Email</th><th>Phone</th><th>Balance</th><th>Joined</th></tr></thead>'+
          '<tbody id="userTableBody"></tbody>'+
        '</table>'+
      '</div>'+
    '</div>';

    list.innerHTML = html;
    renderUserRows(allUsers);
    updateEmailBox();
  }

  function renderUserRows(users){
    var tbody=document.getElementById('userTableBody');
    tbody.innerHTML = users.map(function(u){
      var joined = u.createdAt && u.createdAt.toDate ? u.createdAt.toDate().toLocaleDateString('en-ZM',{day:'numeric',month:'short',year:'numeric'}) : '-';
      var checked = selectedUserEmails.indexOf(u.email) !== -1 ? 'checked' : '';
      return '<tr>'+
        '<td><input type="checkbox" '+checked+' onchange="toggleUserSelection(\''+(u.email||'').replace(/'/g,"\\'")+'\', this.checked)"/></td>'+
        '<td>'+(u.fullName||'-')+'</td>'+
        '<td>'+(u.email||'-')+'</td>'+
        '<td>'+(u.phone||'-')+'</td>'+
        '<td>K'+(u.balance||0)+'</td>'+
        '<td>'+joined+'</td>'+
      '</tr>';
    }).join('');
  }

  function filterUserTable(){
    var q = document.getElementById('userSearch').value.trim().toLowerCase();
    var filtered = allUsers.filter(function(u){
      return (u.fullName||'').toLowerCase().indexOf(q)!==-1 || (u.email||'').toLowerCase().indexOf(q)!==-1;
    });
    renderUserRows(filtered);
  }

  function toggleUserSelection(email, isChecked){
    if(!email) return;
    var idx = selectedUserEmails.indexOf(email);
    if(isChecked && idx===-1) selectedUserEmails.push(email);
    if(!isChecked && idx!==-1) selectedUserEmails.splice(idx,1);
    document.getElementById('selectedCount').textContent = selectedUserEmails.length;
    updateEmailBox();
  }

  function toggleSelectAll(selectAll){
    selectedUserEmails = selectAll ? allUsers.map(function(u){return u.email;}).filter(Boolean) : [];
    document.getElementById('selectedCount').textContent = selectedUserEmails.length;
    renderUserRows(allUsers);
    updateEmailBox();
  }

  function updateEmailBox(){
    var box = document.getElementById('emailListBox');
    if(box) box.value = selectedUserEmails.join(', ');
    var mailtoBtn = document.getElementById('mailtoBtn');
    if(mailtoBtn) mailtoBtn.style.opacity = selectedUserEmails.length ? '1' : '.5';
  }

  function copyAllEmails(){
    if(selectedUserEmails.length===0){ showToast('⚠️ No users selected'); return; }
    navigator.clipboard.writeText(selectedUserEmails.join(', '));
    showToast('✅ Copied '+selectedUserEmails.length+' email(s)! Paste into BCC field.');
  }

  function openMailto(e){
    e.preventDefault();
    if(selectedUserEmails.length===0){ showToast('⚠️ No users selected'); return; }
    // Most email clients support a reasonable number of BCC recipients via mailto;
    // for large lists, copying into BCC manually (via copyAllEmails) is more reliable.
    var bcc = encodeURIComponent(selectedUserEmails.join(','));
    var subject = encodeURIComponent('New Surveys Unlocked on SurveyPay Zambia!');
    var body = encodeURIComponent('Hi there!\n\nWe\'ve added more paid surveys with bigger payouts — log in to your dashboard to check them out.\n\nThanks for testing with us!');
    window.location.href = 'mailto:?bcc='+bcc+'&subject='+subject+'&body='+body;
  }

  function renderInstalls(){
    var list=document.getElementById('paymentsList');
    var relevant = allInstalls.filter(function(i){
      return i.event==='installed' || i.event==='prompt_accepted';
    });

    if(relevant.length===0){
      list.innerHTML='<div class="empty-state">No installs recorded yet.</div>';
      return;
    }

    list.innerHTML=relevant.map(function(i){
      var date=i.timestamp&&i.timestamp.toDate?i.timestamp.toDate().toLocaleString('en-ZM',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'Unknown';
      var deviceGuess='Unknown device';
      var ua=i.platform||'';
      if(/android/i.test(ua)) deviceGuess='Android';
      else if(/iphone|ipad/i.test(ua)) deviceGuess='iPhone/iPad';
      else if(/windows/i.test(ua)) deviceGuess='Windows';
      else if(/mac/i.test(ua)) deviceGuess='Mac';

      return '<div class="payment-card">'+
        '<div class="payment-top">'+
          '<div><div class="payment-name">📲 '+deviceGuess+'</div>'+
          '<div class="payment-email">'+date+'</div></div>'+
          '<span class="status-badge approved">'+(i.event==='installed'?'Installed':'Accepted Prompt')+'</span>'+
        '</div>'+
      '</div>';
    }).join('');
  }

  function renderPayments(){
    if(currentTab==='installs'){ renderInstalls(); return; }
    if(currentTab==='users'){ renderUsers(); return; }
    var filtered=allPayments.filter(function(p){return p.status===currentTab;});
    var list=document.getElementById('paymentsList');

    if(filtered.length===0){
      list.innerHTML='<div class="empty-state">No '+currentTab+' payments.</div>';
      return;
    }

    list.innerHTML=filtered.map(function(p){
      var date=p.submittedAt&&p.submittedAt.toDate?p.submittedAt.toDate().toLocaleString('en-ZM',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'Just now';
      var actionButtons = p.status==='pending'
        ? '<div class="btn-row">'+
            '<button class="approve-btn" onclick="approvePayment(\''+p._id+'\')">✅ Approve</button>'+
            '<button class="reject-btn" onclick="rejectPayment(\''+p._id+'\')">❌ Reject</button>'+
          '</div>'
        : '';

      return '<div class="payment-card">'+
        '<div class="payment-top">'+
          '<div>'+
            '<div class="payment-name">'+(p.fullName||'Unknown')+'</div>'+
            '<div class="payment-email">'+(p.email||'')+'</div>'+
          '</div>'+
          '<div class="payment-amount">K'+p.amount+'</div>'+
        '</div>'+
        '<div class="payment-details">'+
          '<div class="detail-box"><div class="detail-label">Survey</div><div class="detail-value">'+(p.surveyTitle||p.surveyId)+'</div></div>'+
          '<div class="detail-box"><div class="detail-label">MTN Number</div><div class="detail-value">'+(p.phone||'-')+'</div></div>'+
          '<div class="detail-box"><div class="detail-label">Transaction Ref</div><div class="detail-value">'+(p.momoReference||'-')+(looksLikeReferralCode(p.momoReference)?' <span style="color:#ff5252;font-size:.7rem;">⚠️ looks like a referral code</span>':'')+'</div></div>'+
          '<div class="detail-box"><div class="detail-label">Submitted</div><div class="detail-value">'+date+'</div></div>'+
        '</div>'+
        actionButtons+
      '</div>';
    }).join('');
  }

  // ── APPROVE ──
  function approvePayment(docId){
    var payment=allPayments.find(function(p){return p._id===docId;});
    if(!payment)return;

    db.collection('pendingPayments').doc(docId).update({status:'approved'})
    .then(function(){
      // Also update the user's personal copy
      return db.collection('users').doc(payment.uid).collection('pendingPayments').doc(payment.surveyId).update({status:'approved'});
    })
    .then(function(){
      showToast('✅ Payment approved! Survey will unlock for the user.');
      loadPayments();
    })
    .catch(function(err){
      showToast('❌ Error: '+err.message);
    });
  }

  // ── REJECT ──
  function rejectPayment(docId){
    var payment=allPayments.find(function(p){return p._id===docId;});
    if(!payment)return;

    if(!confirm('Reject this payment? The user will need to resubmit.'))return;

    db.collection('pendingPayments').doc(docId).update({status:'rejected'})
    .then(function(){
      return db.collection('users').doc(payment.uid).collection('pendingPayments').doc(payment.surveyId).delete();
    })
    .then(function(){
      showToast('Payment rejected.');
      loadPayments();
    })
    .catch(function(err){
      showToast('❌ Error: '+err.message);
    });
  }
</script>

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/service-worker.js').catch(function(err){
        console.log('Service worker registration failed:', err);
      });
    });
  }
</script>
